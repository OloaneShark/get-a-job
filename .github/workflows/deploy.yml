
name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy on EC2
        run: |
          cd /home/ubuntu/get-a-job
          git fetch origin
          git reset --hard origin/main
          docker compose down
          docker compose up --build -d
          docker image prune -f
            